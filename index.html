<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flazone</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topo">
    <div class="logo">
        <img src="assets/logo/flamengo.png" alt="Flamengo">
        <div>
            <h1>FLAZONE</h1>
            <p>Até o fim, Mengo!</p>
        </div>
    </div>

    <div class="posicao">
        🏆
        <span>1º</span>
    </div>
</header>
<<section class="proximo-jogo">

    <span class="campeonato">🔥 Brasileirão Série A</span>

    <div class="times">

        <div class="time">
            <img src="assets/logo/flamengo.png">
            <h2>Flamengo</h2>
            <p class="mandante">🏠 Casa</p>
        </div>

        <div class="vs">
            <h1>VS</h1>

            <div class="hora">
                18:30
            </div>

            <p>Dom, 26 Jul</p>
        </div>

        <div class="time">
            <img src="assets/logo/saopaulo.png">
            <h2>São Paulo</h2>
            <p class="visitante">✈️ Fora</p>
        </div>

    </div>

    <div class="local">
        📍 Maracanã • Rio de Janeiro
    </div>

</section>
</section>
</body>
</html>
