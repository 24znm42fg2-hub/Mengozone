<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlaZone</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#c8102e;
padding:25px;
text-align:center;
}

header h1{
font-size:34px;
}

header p{
margin-top:5px;
opacity:.8;
}

.container{
padding:20px;
}

.card{

background:#1f1f1f;

border-radius:18px;

padding:20px;

margin-bottom:18px;

}

.card h2{

margin-bottom:15px;

color:#ff4040;

}

.jogo{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}

.time{

text-align:center;

width:40%;

}

.escudo{

width:70px;

height:70px;

object-fit:contain;

}

.vs{

font-size:28px;

font-weight:bold;

color:#777;

}

.data{

text-align:center;

margin-top:10px;

font-size:17px;

color:#ccc;

}

.botao{

margin-top:20px;

width:100%;

padding:15px;

background:#c8102e;

border-radius:12px;

text-align:center;

font-weight:bold;

}

.menu{

position:fixed;

bottom:0;

left:0;

right:0;

height:70px;

background:#181818;

display:flex;

justify-content:space-around;

align-items:center;

border-top:1px solid #333;

}

.item{

text-align:center;

font-size:14px;

}

</style>

</head>

<body>

<header>

<h1>🔴 FlaZone</h1>

<p>O SITE DA NAÇÃO </p>

</header>

<div class="container">

<div class="card">

<h2> Próximo jogo, Brasileirão serie A</h2>

<div class="jogo">

<div class="time">

<img class="escudo" src="https://upload.wikimedia.org/wikipedia/commons/4/43/Flamengo_logo.svg">

<p>Flamengo</p>

</div>

<div class="vs">

VS

</div>

<div class="time">

<img class="escudo" src="https://upload.wikimedia.org/wikipedia/en/0/05/S%C3%A3o_Paulo_FC_logo.svg">

<p>São Paulo</p>

</div>

</div>

<div class="data">

DOM, 27/07/2026<br>

18 : 30

</div>

<div class="botao">

Ver detalhes

</div>

</div>

<div class="card">

<h2>📰 Notícias</h2>

<p>Em breve...</p>

</div>

<div class="card">

<h2>  Brasileirão</h2>

<p>Tabela em breve...</p>

</div>

</div>

<div class="menu">

<div class="item">🏠<br>Início</div>

<div class="item">⚽<br>Jogos</div>

<div class="item">📰<br>Notícias</div>

<div class="item">👤<br>Elenco</div>

</div>

</body>

</html>
